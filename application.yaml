apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: klikgo-local
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Satishkona-7/argocd.git'
    targetRevision: HEAD
    path: .
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: klikgo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true